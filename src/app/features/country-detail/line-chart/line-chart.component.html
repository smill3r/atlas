<figure class="lc" role="img" [attr.aria-label]="label()">
  <svg
    class="lc__svg"
    [attr.viewBox]="'0 0 ' + vw + ' ' + vh"
    preserveAspectRatio="xMidYMid meet"
    aria-hidden="true"
  >
    <!-- Horizontal grid lines -->
    @for (tick of yTicks(); track tick.y) {
      <line
        class="lc__grid"
        [attr.x1]="innerLeft"
        [attr.x2]="innerRight"
        [attr.y1]="tick.y"
        [attr.y2]="tick.y"
      />
    }

    <!-- Y-axis labels -->
    @for (tick of yTicks(); track tick.y) {
      <text
        class="lc__label lc__label--y"
        [attr.x]="innerLeft - 5"
        [attr.y]="tick.y"
      >{{ tick.label }}</text>
    }

    <!-- X-axis labels -->
    @for (tick of xTicks(); track tick.x) {
      <text
        class="lc__label lc__label--x"
        [attr.x]="tick.x"
        [attr.y]="innerBottom + 18"
      >{{ tick.label }}</text>
    }

    <!-- World average (dashed, behind country line) -->
    @if (globalPath()) {
      <path
        class="lc__global"
        [attr.d]="globalPath()"
        fill="none"
      />
    }

    <!-- Country line -->
    @if (countryPath()) {
      <path
        class="lc__country"
        [attr.d]="countryPath()"
        fill="none"
        pathLength="1"
        [attr.stroke]="color()"
      />
    }

    <!-- Selected year marker line -->
    @if (markerX() !== null) {
      <line
        class="lc__marker"
        [attr.x1]="markerX()"
        [attr.x2]="markerX()"
        [attr.y1]="innerTop"
        [attr.y2]="innerBottom"
      />
    }

    <!-- Dot at selected year value -->
    @if (markerDot(); as dot) {
      <circle
        class="lc__dot"
        [attr.cx]="dot.x"
        [attr.cy]="dot.y"
        r="4.5"
        [attr.fill]="color()"
      />
    }
  </svg>

  <figcaption class="lc__legend" aria-hidden="true">
    <span class="lc__legend-item">
      <svg width="18" height="3" aria-hidden="true">
        <line x1="0" y1="1.5" x2="18" y2="1.5" stroke-width="2.5" [attr.stroke]="color()" />
      </svg>
      Country
    </span>
    <span class="lc__legend-item lc__legend-item--global">
      <svg width="18" height="3" aria-hidden="true">
        <line x1="0" y1="1.5" x2="18" y2="1.5" stroke-width="2" stroke="#6b6155" stroke-dasharray="4 2.5" />
      </svg>
      World avg
    </span>
  </figcaption>
</figure>
