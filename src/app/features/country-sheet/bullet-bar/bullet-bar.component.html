<svg
  class="bullet"
  [attr.viewBox]="'0 0 ' + viewboxWidth + ' ' + viewboxHeight"
  preserveAspectRatio="none"
  [attr.aria-label]="label()"
  role="img"
>
  @for (band of bands(); track $index) {
    <rect
      [attr.x]="band.x"
      y="4"
      [attr.width]="band.w"
      [attr.height]="viewboxHeight - 8"
      [attr.fill]="band.color"
      opacity="0.4"
      rx="1"
    />
  }
  <rect
    x="0"
    y="4"
    [attr.width]="viewboxWidth"
    [attr.height]="viewboxHeight - 8"
    fill="none"
    stroke="currentColor"
    stroke-width="0.5"
    opacity="0.2"
    rx="1"
  />
  @if (dotX() !== null) {
    <circle
      [attr.cx]="dotX()"
      [attr.cy]="viewboxHeight / 2"
      [attr.r]="dotRadius"
      fill="currentColor"
      stroke="var(--c-paper)"
      stroke-width="1.5"
    />
  }
</svg>
